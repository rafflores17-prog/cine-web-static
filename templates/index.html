<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineSky Web - StartStatic</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #141414; color: white; font-family: 'Arial', sans-serif; }
        .navbar { background-color: rgba(0,0,0,0.9); }
        .movie-card { transition: transform 0.3s; cursor: pointer; margin-bottom: 20px; }
        .movie-card:hover { transform: scale(1.05); }
        .movie-img { border-radius: 8px; width: 100%; }
        h2 { margin-top: 30px; font-weight: bold; color: #E50914; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark p-3">
    <a class="navbar-brand" href="#">🎬 <b>CineSky Web</b></a>
</nav>

<div class="container">
    <h2>🔥 Filmes em Cartaz</h2>
    <div class="row">
        {% for m in cartaz %}
        <div class="col-6 col-md-2 movie-card">
            <img src="{{ img_base }}{{ m.poster_path }}" class="movie-img" alt="{{ m.title }}">
            <p class="text-center mt-2 small">{{ m.title }}</p>
        </div>
        {% endfor %}
    </div>

    <h2>🌟 Mais Populares</h2>
    <div class="row">
        {% for m in populares %}
        <div class="col-6 col-md-2 movie-card">
            <img src="{{ img_base }}{{ m.poster_path }}" class="movie-img" alt="{{ m.title }}">
            <p class="text-center mt-2 small">{{ m.title }}</p>
        </div>
        {% endfor %}
    </div>
</div>

<footer class="text-center p-5 text-muted">
    Desenvolvido por @ericDfp | StartStatic 2026
</footer>

</body>
</html>
