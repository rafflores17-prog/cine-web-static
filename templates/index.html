<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CineMega</title>

<link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#e50914">

<style>
body { margin:0; font-family:Arial; background:#0f0f0f; color:white; }
.hero { text-align:center; padding:40px; }
input { width:70%; padding:12px; border-radius:20px; border:none; }
button { padding:12px; border-radius:20px; background:#e50914; color:white; border:none; cursor:pointer; }
.row { display:flex; flex-wrap:wrap; justify-content:center; gap:10px; padding:20px; }
.card { width:150px; text-align:center; }
.card img { width:100%; border-radius:10px; transition: 0.3s; }
.card img:hover { transform: scale(1.05); }
</style>
</head>

<body>

<div class="hero">
  <h1>🎬 CineMega</h1>
  <form method="GET">
    <input name="q" placeholder="Pesquise seu filme favorito aqui">
    <button type="submit">Buscar</button>
  </form>
</div>

<div class="row">
{% for f in filmes %}
  {% if f.poster_path %}
  <a href="/filme/{{ f.id }}" style="color:white;text-decoration:none;">
    <div class="card">
      <img src="{{ img }}{{ f.poster_path }}">
      <p>{{ f.title }}</p>
    </div>
  </a>
  {% endif %}
{% endfor %}
</div>
