<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{{ nome_site }}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* TRAVA MESTRE - IMPEDE SELEÇÃO E MENU DE CONTEXTO */
        * {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -khtml-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        input, textarea {
            -webkit-user-select: text !important;
            user-select: text !important;
        }
        
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 0; }
        .header { padding: 15px; text-align: center; background: #111; position: sticky; top: 0; z-index: 100; border-bottom: 2px solid #e50914; }
        .header h1 { color: #e50914; margin: 0; font-size: 24px; text-transform: uppercase; letter-spacing: 2px; }
        
        .search-container { padding: 15px; display: flex; justify-content: center; }
        .search-container input { 
            width: 80%; padding: 12px; border-radius: 25px; border: none; 
            background: #222; color: #fff; font-size: 16px; outline: none;
        }

        .grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); 
            gap: 10px; padding: 10px; 
        }
        .card { background: #111; border-radius: 8px; overflow: hidden; transition: 0.3s; position: relative; }
        .card:active { transform: scale(0.95); }
        .card img { width: 100%; display: block; border-radius: 8px; }
        .card-info { padding: 5px; text-align: center; font-size: 12px; }
        
        a { text-decoration: none; color: inherit; }
        .ads-container { text-align: center; margin: 10px 0; }
    </style>
</head>
<body oncontextmenu="return false;" onselectstart="return false;" ondragstart="return false;">

    <div class="header">
        <h1>{{ nome_site }}</h1>
    </div>

    <div class="ads-container">
        </div>

    <div class="search-container">
        <form action="/" method="get" style="width: 100%; text-align: center;">
            <input type="text" name="q" placeholder="Buscar filmes..." autocomplete="off">
        </form>
    </div>

    <div class="grid">
        {% for filme in filmes %}
        <a href="/filme/{{ filme.id }}" class="card">
            <img src="{{ img }}{{ filme.poster_path }}" alt="{{ filme.title }}">
            <div class="card-info">{{ filme.title[:15] }}...</div>
        </a>
        {% endfor %}
    </div>

    <div class="ads-container">
        </div>

</body>
</html>
