<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cine</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:white;
}

/* HERO */
.hero {
  text-align:center;
  padding:40px;
  background:linear-gradient(to bottom, #111, #0f0f0f);
}

input {
  width:70%;
  padding:12px;
  border-radius:20px;
  border:none;
}

button {
  padding:12px;
  border-radius:20px;
  border:none;
  background:#e50914;
  color:white;
}

/* SEÇÕES */
.section {
  padding:10px 15px;
}

.section h2 {
  border-left:4px solid #e50914;
  padding-left:10px;
}

/* CARROSSEL */
.row {
  display:flex;
  overflow-x:auto;
  gap:10px;
  padding:10px 0;
}

.card {
  min-width:140px;
  text-align:center;
}

.card img {
  width:100%;
  border-radius:10px;
}

/* MOBILE */
@media(max-width:768px){
  input { width:90%; }
}
</style>
</head>

<body>

<div class="hero">
  <h1>🎬 CineMega</h1>

  <form>
    <input name="q" placeholder="Buscar filme...">
    <button>Buscar</button>
  </form>
</div>

{% for lista in listas %}
<div class="section">
  <h2>{{ lista.titulo }}</h2>

  <div class="row">
  {% for filme in lista.filmes %}
    {% if filme.poster_path %}

    <a href="/filme/{{ filme.id }}" style="color:white;text-decoration:none;">
      <div class="card">
        <img src="{{ img }}{{ filme.poster_path }}">
        <p>{{ filme.title }}</p>
      </div>
    </a>

    {% endif %}
  {% endfor %}
  </div>

</div>
{% endfor %}

</body>
</html>
