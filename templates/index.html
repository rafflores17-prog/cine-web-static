<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CineMega</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:white;
}

.hero {
  text-align:center;
  padding:40px;
}

input {
  width:70%;
  padding:12px;
  border-radius:20px;
  border:none;
}

button {
  padding:12px;
  border-radius:20px;
  background:#e50914;
  color:white;
  border:none;
}

.row {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
  padding:20px;
}

.card {
  width:150px;
  text-align:center;
}

.card img {
  width:100%;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="hero">
  <h1>🎬 CineMega</h1>

  <form method="GET">
    <input name="q" placeholder="Pesquise seu filme favorito aqui">
    <button>Buscar</button>
  </form>
</div>

<div class="row">

{% for f in filmes %}
  {% if f.poster_path %}
  <a href="/filme/{{ f.id }}" style="color:white;text-decoration:none;">
    <div class="card">
      <img src="{{ img }}{{ f.poster_path }}">
      <p>{{ f.title }}</p>
    </div>
  </a>
  {% endif %}
{% endfor %}

</div>

</body>
</html>
