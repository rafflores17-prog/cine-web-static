<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CineMega</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:white;
}

/* HERO */
.hero {
  text-align:center;
  padding:50px 20px;
  background:linear-gradient(to bottom, #111, #0f0f0f);
}

.hero h1 {
  margin-bottom:15px;
}

/* SEARCH */
form {
  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
}

input {
  width:60%;
  max-width:500px;
  padding:12px 15px;
  border-radius:25px;
  border:none;
  outline:none;
}

button {
  padding:12px 20px;
  border-radius:25px;
  border:none;
  background:#e50914;
  color:white;
  cursor:pointer;
  font-weight:bold;
}

/* SEÇÃO */
.section {
  padding:20px 15px;
}

.section h2 {
  border-left:4px solid #e50914;
  padding-left:10px;
  margin-bottom:10px;
}

/* CARROSSEL */
.row {
  display:flex;
  overflow-x:auto;
  gap:12px;
  padding:10px 5px;
  scroll-snap-type:x mandatory;
}

/* ESCONDE SCROLLBAR */
.row::-webkit-scrollbar {
  display:none;
}

/* CARD */
.card {
  min-width:150px;
  max-width:150px;
  scroll-snap-align:start;
  text-align:center;
  transition:0.3s;
}

.card:hover {
  transform:scale(1.05);
}

.card img {
  width:100%;
  height:220px;
  object-fit:cover;
  border-radius:12px;
  box-shadow:0 8px 20px rgba(0,0,0,0.5);
}

.card p {
  font-size:14px;
  margin-top:6px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

/* MOBILE */
@media(max-width:768px){
  input { width:80%; }
}
</style>
</head>

<body>

<div class="hero">
  <h1>🎬 CineMega</h1>

  <form method="GET">
    <input name="q" placeholder="Buscar filme...">
    <button type="submit">Buscar</button>
  </form>
</div>

{% for lista in listas %}
<div class="section">
  <h2>{{ lista.titulo }}</h2>

  <div class="row">
  {% for filme in lista.filmes %}
    {% if filme.poster_path %}

    <a href="/filme/{{ filme.id }}" style="color:white;text-decoration:none;">
      <div class="card">
        <img src="{{ img }}{{ filme.poster_path }}" loading="lazy">
        <p>{{ filme.title }}</p>
      </div>
    </a>

    {% endif %}
  {% endfor %}
  </div>

</div>
{% endfor %}

</body>
</html>
