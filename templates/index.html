<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CineMega</title>

<link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#e50914">

<style>
/* BLOQUEIO DE MENU PWA */
* {
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none; /* Bloqueia o menu do print */
    -webkit-user-select: none;   /* Bloqueia seleção de texto */
    user-select: none;
    box-sizing: border-box;
}

/* Libera apenas o campo de pesquisa */
input {
    -webkit-user-select: text;
    user-select: text;
}

body { margin:0; font-family:Arial; background:#0f0f0f; color:white; overflow-x: hidden; }
.hero { text-align:center; padding:40px; }
input { width:70%; padding:12px; border-radius:20px; border:none; outline: none; }
button { padding:12px; border-radius:20px; background:#e50914; color:white; border:none; cursor:pointer; font-weight: bold; }
.row { display:flex; flex-wrap:wrap; justify-content:center; gap:10px; padding:20px; }
.card { width:150px; text-align:center; transition: transform 0.2s; }
.card:active { transform: scale(0.95); }
.card img { width:100%; border-radius:10px; pointer-events: none; } /* pointer-events impede o segurar na imagem */
</style>
</head>

<body oncontextmenu="return false;"> <div class="hero">
  <h1>🎬 CineMega</h1>
  <form method="GET">
    <input name="q" placeholder="Pesquise seu filme favorito aqui">
    <button type="submit">Buscar</button>
  </form>
</div>

<div class="row">
{% for f in filmes %}
  {% if f.poster_path %}
  <a href="/filme/{{ f.id }}" style="color:white;text-decoration:none;">
    <div class="card">
      <img src="{{ img }}{{ f.poster_path }}">
      <p>{{ f.title }}</p>
    </div>
  </a>
  {% endif %}
{% endfor %}
</div>
