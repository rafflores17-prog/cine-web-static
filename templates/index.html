<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineTor - Filmes e Séries</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #080808; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow-x: hidden; }
        
        /* Navbar PRO */
        .navbar { 
            background: rgba(10, 10, 10, 0.85); 
            backdrop-filter: blur(10px); 
            border-bottom: 1px solid #e50914; 
        }
        .brand-text { font-weight: 900; font-size: 1.5rem; letter-spacing: 1px; color: #e50914 !important; }
        .search-box { 
            background: #1a1a1a; border: 1px solid #333; color: white; 
            border-radius: 30px; padding: 8px 20px; outline: none; transition: 0.3s;
        }
        .search-box:focus { background: #222; border-color: #e50914; box-shadow: 0 0 10px rgba(229, 9, 20, 0.3); color: white;}
        
        /* Menu de Filtros */
        .menu-filtros { padding: 12px 10px; overflow-x: auto; white-space: nowrap; border-bottom: 1px solid #222; }
        .menu-filtros::-webkit-scrollbar { display: none; }
        .btn-filtro { 
            background: #111; border: 1px solid #333; color: #ccc; border-radius: 20px; 
            padding: 6px 18px; text-decoration: none; margin: 0 5px; font-size: 0.9rem; transition: 0.3s; 
        }
        .btn-filtro:hover { background: #e50914; color: white; border-color: #e50914; }
        
        /* Carrossel de Filmes */
        .row-horizontal { display: flex; overflow-x: auto; padding-bottom: 20px; gap: 12px; padding-left: 10px; scrollbar-width: none; }
        .row-horizontal::-webkit-scrollbar { display: none; }
        .card-filme { flex: 0 0 auto; width: 135px; transition: 0.3s; text-decoration: none; color: #ccc; position: relative;}
        .card-filme:hover { transform: translateY(-5px); color: white; }
        .card-filme img { border-radius: 8px; width: 100%; box-shadow: 0 4px 10px rgba(0,0,0,0.8); border: 1px solid #222;}
        
        .secao-titulo { border-left: 5px solid #e50914; padding-left: 12px; margin-top: 30px; font-weight: bold; font-size: 1.3rem; margin-left: 10px;}
    </style>
</head>
<body>

<nav class="navbar navbar-dark p-3 sticky-top">
    <div class="container d-flex justify-content-between align-items-center">
        <a class="navbar-brand brand-text" href="/">🎬 CineTor</a>
        <form class="d-flex" action="/">
            <input class="form-control search-box" type="search" name="q" placeholder="Buscar filmes...">
        </form>
    </div>
</nav>

<div class="menu-filtros">
    <a href="/" class="btn-filtro">🏠 Início</a>
    <a href="/?ano=1980" class="btn-filtro">🎸 Anos 80</a>
    <a href="/?ano=1990" class="btn-filtro">💾 Anos 90</a>
    <a href="/?ano=2000" class="btn-filtro">💿 Anos 2000</a>
    <a href="/?genero=28" class="btn-filtro">🔥 Ação</a>
    <a href="/?genero=27" class="btn-filtro">👻 Terror</a>
    <a href="/?genero=35" class="btn-filtro">🤡 Comédia</a>
</div>

<div class="mt-2">
    {% for lista in listas %}
        <h4 class="secao-titulo">{{ lista.titulo }}</h4>
        <div class="row-horizontal mt-3">
            {% for m in lista.filmes %}
            <a href="/filme/{{ m.id }}" class="card-filme">
                {% if m.poster_path %}
                <img src="{{ img_base }}{{ m.poster_path }}" alt="{{ m.title }}">
                {% else %}
                <div style="width:100%; height:200px; background:#222; border-radius:8px; display:flex; align-items:center; text-align:center; padding:10px;">{{ m.title }}</div>
                {% endif %}
            </a>
            {% endfor %}
        </div>
    {% endfor %}
</div>

</body>
</html>
