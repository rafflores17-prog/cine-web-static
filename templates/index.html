<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>CineFinal</title>

<style>
body {
  background:#0f0f0f;
  color:white;
  font-family:Arial;
}

.hero {
  text-align:center;
  padding:30px;
}

input {
  width:70%;
  padding:12px;
  border-radius:20px;
}

button {
  padding:12px;
  border-radius:20px;
  background:#e50914;
  color:white;
  border:none;
}

.row {
  display:flex;
  overflow-x:auto;
  gap:10px;
  padding:10px;
}

.card {
  min-width:150px;
}

.card img {
  width:100%;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="hero">
  <h1>CineFinal 🍿</h1>

  <form>
    <input name="q" placeholder="Buscar filme...">
    <button>Buscar</button>
  </form>
</div>

{% for lista in listas %}
<h3>{{ lista.titulo }}</h3>

<div class="row">
{% for filme in lista.filmes %}
{% if filme.poster_path %}

<a href="/filme/{{ filme.id }}" style="color:white;text-decoration:none;">
  <div class="card">
    <img src="{{ img }}{{ filme.poster_path }}">
    <p>{{ filme.title }}</p>
  </div>
</a>

{% endif %}
{% endfor %}
</div>

{% endfor %}

</body>
</html>
