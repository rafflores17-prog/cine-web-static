<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CineMega</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:white;
}

/* HERO */
.hero {
  text-align:center;
  padding:50px 20px;
  background:#111;
}

input {
  padding:12px;
  width:60%;
  border-radius:20px;
  border:none;
}

button {
  padding:12px 18px;
  border:none;
  border-radius:20px;
  background:#e50914;
  color:white;
  cursor:pointer;
}

/* BOTÕES DÉCADA */
.decadas {
  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
  margin-top:15px;
}

.decadas button {
  background:#222;
  border:1px solid #333;
  padding:10px 15px;
}

.decadas button:hover {
  background:#e50914;
}

/* FILMES */
.row {
  display:flex;
  overflow-x:auto;
  gap:12px;
  padding:20px;
}

.card {
  min-width:140px;
  text-align:center;
}

.card img {
  width:100%;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="hero">
  <h1>🎬 CineMega</h1>

  <form method="GET">
    <input name="q" placeholder="Buscar filme...">
    <button>Buscar</button>
  </form>

  <div class="decadas">
    <button onclick="carregar('80')">80s</button>
    <button onclick="carregar('90')">90s</button>
    <button onclick="carregar('2000')">2000</button>
    <button onclick="carregar('2010')">2010</button>
    <button onclick="carregar('2020')">2020+</button>
  </div>
</div>

<h2 style="padding-left:15px;">🎥 Filmes</h2>

<div class="row" id="lista">
  {% for f in filmes %}
  <div class="card">
    <img src="{{ img }}{{ f.poster_path }}">
    <p>{{ f.title }}</p>
  </div>
  {% endfor %}
</div>

<script>
let usados = [];

function carregar(decada){

  fetch(`/decada/${decada}`)
    .then(r => r.json())
    .then(data => {

      let lista = document.getElementById("lista");
      lista.innerHTML = "";

      let filmes = data.filmes || [];

      // evita repetição enquanto página aberta
      filmes = filmes.filter(f => !usados.includes(f.id));

      filmes.forEach(f => {
        usados.push(f.id);

        lista.innerHTML += `
          <div class="card">
            <img src="https://image.tmdb.org/t/p/w500${f.poster_path}">
            <p>${f.title}</p>
          </div>
        `;
      });

    });

}
</script>

</body>
</html>
