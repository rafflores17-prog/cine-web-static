<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CineMega</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:white;
}

/* HERO */
.hero {
  text-align:center;
  padding:40px 20px;
  background:linear-gradient(180deg,#1a1a1a,#0f0f0f);
}

.hero h1 {
  margin-bottom:15px;
}

/* INPUT */
form {
  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
}

input {
  width:60%;
  max-width:500px;
  padding:12px;
  border-radius:25px;
  border:none;
  outline:none;
}

button {
  padding:12px 18px;
  border-radius:25px;
  border:none;
  background:#e50914;
  color:white;
  font-weight:bold;
}

/* BOTÕES DÉCADA */
.decadas {
  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
  margin-top:15px;
}

.decadas button {
  background:#222;
  border:1px solid #333;
  padding:10px 14px;
  border-radius:20px;
  cursor:pointer;
  transition:0.2s;
}

.decadas button:hover {
  background:#e50914;
}

/* LISTA */
.row {
  display:flex;
  overflow-x:auto;
  gap:12px;
  padding:20px;
}

.row::-webkit-scrollbar {
  display:none;
}

/* CARD */
.card {
  min-width:140px;
  text-align:center;
}

.card img {
  width:100%;
  border-radius:10px;
  height:210px;
  object-fit:cover;
}

.card p {
  font-size:13px;
  margin-top:5px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

/* LOADING */
.loading {
  text-align:center;
  padding:20px;
  color:#aaa;
}
</style>
</head>

<body>

<div class="hero">
  <h1>🎬 CineMega</h1>

  <form method="GET">
    <input name="q" placeholder="Buscar filme...">
    <button>Buscar</button>
  </form>

  <div class="decadas">
    <button onclick="carregar('80')">80s</button>
    <button onclick="carregar('90')">90s</button>
    <button onclick="carregar('2000')">2000</button>
    <button onclick="carregar('2010')">2010</button>
    <button onclick="carregar('2020')">2020+</button>
  </div>
</div>

<h3 style="padding-left:15px;">🎥 Filmes</h3>

<div id="lista" class="row">

  {% for f in filmes %}
  <div class="card">
    <img src="{{ img }}{{ f.poster_path }}">
    <p>{{ f.title }}</p>
  </div>
  {% endfor %}

</div>

<div id="status" class="loading"></div>

<script>
function carregar(decada){

  const lista = document.getElementById("lista");
  const status = document.getElementById("status");

  status.innerText = "Carregando...";

  fetch(`/decada/${decada}`)
    .then(r => r.json())
    .then(data => {

      lista.innerHTML = "";

      let filmes = data.filmes || [];

      if (filmes.length === 0) {
        status.innerText = "Sem dados, tentando novamente...";
        return;
      }

      status.innerText = "";

      filmes.forEach(f => {
        lista.innerHTML += `
          <div class="card">
            <img src="https://image.tmdb.org/t/p/w500${f.poster_path}">
            <p>${f.title}</p>
          </div>
        `;
      });

    })
    .catch(() => {
      status.innerText = "Erro ao carregar dados";
    });

}
</script>

</body>
</html>
