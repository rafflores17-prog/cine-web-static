<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StartStatic - CineWeb</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0b0b0b; color: white; font-family: sans-serif; overflow-x: hidden; }
        .navbar { background: rgba(0,0,0,0.9); border-bottom: 2px solid #db0000; }
        .menu-filtros { background: #111; padding: 10px 0; overflow-x: auto; white-space: nowrap; border-bottom: 1px solid #333; }
        .menu-filtros::-webkit-scrollbar { display: none; }
        .btn-filtro { border: 1px solid #555; color: #ccc; border-radius: 20px; padding: 5px 15px; text-decoration: none; margin: 0 5px; font-size: 0.9rem; transition: 0.3s; }
        .btn-filtro:hover { background: #db0000; color: white; border-color: #db0000; }
        .row-horizontal { display: flex; overflow-x: auto; padding-bottom: 15px; gap: 15px; scrollbar-width: none; }
        .row-horizontal::-webkit-scrollbar { display: none; }
        .card-filme { flex: 0 0 auto; width: 140px; transition: 0.3s; text-decoration: none; color: white; }
        .card-filme:hover { transform: scale(1.05); color: #db0000; }
        .card-filme img { border-radius: 8px; width: 100%; box-shadow: 0 4px 8px rgba(0,0,0,0.6); }
        .secao-titulo { border-left: 4px solid #db0000; padding-left: 10px; margin-top: 30px; font-weight: bold; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark p-3 sticky-top">
    <div class="container d-flex justify-content-between align-items-center">
        <a class="navbar-brand" href="/">🎬 <b>CineWeb</b></a>
        <form class="d-flex" action="/">
            <input class="form-control bg-dark text-white border-secondary" type="search" name="q" placeholder="Buscar filmes...">
        </form>
    </div>
</nav>

<div class="menu-filtros px-3">
    <a href="/" class="btn-filtro">🏠 Início</a>
    <a href="/?ano=1980" class="btn-filtro">🎸 Anos 80</a>
    <a href="/?ano=1990" class="btn-filtro">💾 Anos 90</a>
    <a href="/?ano=2000" class="btn-filtro">💿 Anos 2000</a>
    <a href="/?genero=28" class="btn-filtro">🔥 Ação</a>
    <a href="/?genero=27" class="btn-filtro">👻 Terror</a>
    <a href="/?genero=35" class="btn-filtro">🤡 Comédia</a>
</div>

<div class="container mt-3">
    {% for lista in listas %}
        <h4 class="secao-titulo">{{ lista.titulo }}</h4>
        <div class="row-horizontal mt-3">
            {% for m in lista.filmes %}
            <a href="/filme/{{ m.id }}" class="card-filme">
                {% if m.poster_path %}
                <img src="{{ img_base }}{{ m.poster_path }}" alt="{{ m.title }}">
                {% else %}
                <div style="width:100%; height:210px; background:#222; border-radius:8px; display:flex; align-items:center; text-align:center; padding:10px;">{{ m.title }}</div>
                {% endif %}
            </a>
            {% endfor %}
        </div>
    {% endfor %}
</div>

</body>
</html>
