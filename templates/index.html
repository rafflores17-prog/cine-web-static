<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineTor - Filmes</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #0f0f0f;
            color: white;
            font-family: Arial, sans-serif;
        }

        .hero {
            padding: 80px 20px;
            text-align: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7), #0f0f0f);
        }

        .search-box {
            max-width: 600px;
            margin: auto;
            display: flex;
        }

        .search-box input {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 30px 0 0 30px;
            outline: none;
        }

        .search-box button {
            padding: 15px 25px;
            border: none;
            background: #e50914;
            color: white;
            border-radius: 0 30px 30px 0;
            font-weight: bold;
        }

        .movie-card {
            width: 160px;
            margin: 10px;
            text-align: center;
        }

        .movie-card img {
            width: 100%;
            border-radius: 10px;
        }

        .movie-title {
            font-size: 14px;
            margin-top: 5px;
        }

        .scroll-row {
            display: flex;
            overflow-x: auto;
            padding: 10px;
        }

        .scroll-row::-webkit-scrollbar {
            display: none;
        }

        a {
            text-decoration: none;
            color: white;
        }
    </style>
</head>

<body>

<!-- HEADER -->
<div class="hero">
    <h1>CineTor 🎬</h1>
    <p>Filmes + Torrents em um só lugar</p>

    <form action="/" method="GET" class="search-box mt-4">
        <input type="text" name="q" placeholder="Buscar filme..." value="{{ request.args.get('q','') }}">
        <button type="submit">Buscar</button>
    </form>
</div>

<!-- LISTAS -->
<div class="container mt-4">

    {% for lista in listas %}

        <h4 class="mt-4 mb-2">{{ lista.titulo }}</h4>

        <div class="scroll-row">

            {% for filme in lista.filmes %}

                {% if filme.poster_path %}
                <a href="/filme/{{ filme.id }}">
                    <div class="movie-card">
                        <img src="{{ img }}{{ filme.poster_path }}">
                        <div class="movie-title">
                            {{ filme.title }}
                        </div>
                    </div>
                </a>
                {% endif %}

            {% endfor %}

        </div>

    {% endfor %}

</div>

</body>
</html>
