<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>{{ filme.title }} - {{ nome_site }}</title>

<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css"/>

<style>

body {
    margin: 0;
    background: #000;
    color: white;
    font-family: Arial, Helvetica, sans-serif;
}

.banner {

    background-image: url('{{ bg }}{{ filme.backdrop_path }}');

    background-size: cover;
    background-position: center;

    padding: 30px;

}

.container {

    max-width: 1000px;
    margin: auto;

}

.poster {

    width: 200px;
    border-radius: 10px;

}

.video-box {

    margin-top: 20px;

}

.player-wrapper {

    position: relative;
    width: 100%;
    background: black;
    border-radius: 10px;
    overflow: hidden;

}

video {

    width: 100%;
    height: auto;
    background: black;

}

.botao {

    display: inline-block;
    margin-top: 15px;
    padding: 12px 20px;
    background: red;
    color: white;
    border-radius: 8px;
    text-decoration: none;
    font-weight: bold;

}

</style>

</head>

<body>

<div class="banner">

<div class="container">

<h1>{{ filme.title }}</h1>

<p>

⭐ {{ filme.vote_average }}

</p>

</div>

</div>

<div class="container">

<img
class="poster"
src="{{ img }}{{ filme.poster_path }}"
>

<p>

{{ filme.overview }}

</p>

<div class="video-box">

{% if play_link %}

<div class="player-wrapper">

<video
id="player"
controls
playsinline
preload="metadata"
>

<source
src="{{ play_link }}"
type="video/mp4"
>

Seu navegador não suporta vídeo.

</video>

</div>

{% else %}

<p>

Filme não disponível no momento.

</p>

{% endif %}

</div>

{% if trailer_key %}

<h2>Trailer</h2>

<iframe
width="100%"
height="400"
src="https://www.youtube.com/embed/{{ trailer_key }}"
frameborder="0"
allowfullscreen
>

</iframe>

{% endif %}

<a href="/" class="botao">

← Voltar

</a>

</div>

<script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>

<script>

const player = new Plyr('#player', {

controls: [
'play',
'progress',
'current-time',
'mute',
'volume',
'fullscreen'
],

fullscreen: {
enabled: true,
fallback: true,
iosNative: true
}

});

</script>

</body>

</html>
