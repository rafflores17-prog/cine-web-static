<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{{ filme.title }} - {{ nome_site }}</title>
    <style>
        /* TRAVA MESTRE - IMPEDE SELEÇÃO E MENU DE CONTEXTO */
        * {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -khtml-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 0; }
        .banner { 
            width: 100%; height: 250px; background-size: cover; background-position: center;
            position: relative; border-bottom: 3px solid #e50914;
        }
        .banner::after {
            content: ''; position: absolute; bottom: 0; width: 100%; height: 100%;
            background: linear-gradient(transparent, #000);
        }
        .content { padding: 20px; position: relative; margin-top: -50px; z-index: 10; }
        .title { font-size: 28px; font-weight: bold; margin-bottom: 10px; }
        .info { color: #aaa; margin-bottom: 20px; font-size: 14px; }
        .sinopse { line-height: 1.6; color: #ddd; margin-bottom: 30px; }
        
        .btn-play {
            display: block; width: 100%; padding: 15px; background: #e50914;
            color: #fff; text-align: center; border-radius: 5px; font-weight: bold;
            font-size: 18px; text-decoration: none; margin-bottom: 15px;
        }
        .btn-trailer {
            display: block; width: 100%; padding: 15px; background: #333;
            color: #fff; text-align: center; border-radius: 5px; font-weight: bold;
            font-size: 18px; text-decoration: none;
        }
        .btn-play:active, .btn-trailer:active { transform: scale(0.98); }
        
        .ads-area { text-align: center; margin: 20px 0; min-height: 50px; }
    </style>
</head>
<body oncontextmenu="return false;" onselectstart="return false;" ondragstart="return false;">

    <div class="banner" style="background-image: url('{{ bg }}{{ filme.backdrop_path }}');"></div>

    <div class="content">
        <div class="title">{{ filme.title }}</div>
        <div class="info">⭐ {{ filme.vote_average }} | {{ filme.release_date[:4] }}</div>
        
        <div class="ads-area">
            </div>

        <div class="sinopse">{{ filme.overview }}</div>

        {% if play_link %}
            <a href="{{ play_link }}" class="btn-play">ASSISTIR AGORA</a>
        {% else %}
            <div class="btn-play" style="background: #555;">FILME INDISPONÍVEL</div>
        {% endif %}

        {% if trailer_key %}
            <a href="https://www.youtube.com/watch?v={{ trailer_key }}" class="btn-trailer">VER TRAILER</a>
        {% endif %}

        <div class="ads-area">
            </div>
    </div>

</body>
</html>
