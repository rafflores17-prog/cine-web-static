<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>{{ filme.title }}</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:black;
  color:white;
}

.container {
  padding:20px;
}

.bg {
  background-size:cover;
  background-position:center;
  height:300px;
  filter:blur(2px) brightness(0.5);
}

.content {
  margin-top:-200px;
  position:relative;
  padding:20px;
}

img {
  width:200px;
  border-radius:10px;
}

.trailer {
  margin-top:20px;
}
</style>
</head>

<body>

<div class="bg" style="background-image:url('{{ bg }}{{ filme.backdrop_path }}')"></div>

<div class="content">

  <h1>{{ filme.title }}</h1>

  <img src="{{ img }}{{ filme.poster_path }}">

  <p>{{ filme.overview }}</p>

  {% if trailer %}
  <div class="trailer">
    <iframe width="100%" height="300"
      src="https://www.youtube.com/embed/{{ trailer }}"
      frameborder="0" allowfullscreen>
    </iframe>
  </div>
  {% endif %}

</div>

</body>
</html>
