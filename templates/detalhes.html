<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ filme.title }} | {{ nome_site }}</title>
<style>
* { box-sizing: border-box; }
body { margin:0; font-family: sans-serif; color:white; background:black; overflow-x:hidden; }
.bg { position:fixed; top:0; left:0; width:100%; height:100%; background-size:cover; background-position:center; filter:blur(25px) brightness(0.2); z-index:-1; }
.container { padding:20px; max-width:450px; margin:0 auto; text-align:center; }
.poster img { width:140px; border-radius:15px; box-shadow:0 10px 25px rgba(0,0,0,0.8); margin-bottom:10px; }
.player-wrapper { width: 100%; border-radius: 12px; overflow: hidden; background: #000; margin: 15px 0; border: 1px solid #333; min-height: 200px; display: flex; align-items: center; justify-content: center; }
video { width: 100%; display: block; background: #000; }
h1 { font-size:20px; color:#e50914; margin:5px 0; }
.btn-alt { display: block; width: 100%; background: #00a859; color: white; padding: 15px; border-radius: 50px; font-weight: bold; text-decoration: none; margin: 10px auto; font-size: 14px; }
.overview { background:rgba(255,255,255,0.07); padding:15px; border-radius:12px; font-size:13px; text-align:justify; }
.back { display:inline-block; margin-bottom:15px; color:#ccc; text-decoration:none; font-size:12px; background: rgba(255,255,255,0.1); padding: 5px 15px; border-radius: 20px; }
</style>
</head>
<body>
<div class="bg" style="background-image:url('{{ bg }}{{ filme.backdrop_path }}')"></div>
<div class="container">
  <a class="back" href="/">⬅ Voltar</a>
  <div class="poster"><img src="{{ img }}{{ filme.poster_path }}"></div>
  <h1>{{ filme.title }}</h1>
  
  {% if play_link %}
    <div class="player-wrapper">
        <video id="player" controls playsinline poster="{{ bg }}{{ filme.backdrop_path }}">
            <source src="{{ play_link }}" type="video/mp4">
            Seu dispositivo não suporta o play direto.
        </video>
    </div>
    <a href="{{ play_link }}" target="_blank" class="btn-alt">🚀 ABRIR NO PLAYER EXTERNO</a>
  {% else %}
    <div class="player-wrapper"><p style="font-size:12px; color:#aaa;">🔍 Sinal VIP não localizado para este título.</p></div>
  {% endif %}
  
  <div class="overview">{{ filme.overview }}</div>
</div>
</body>
</html>
