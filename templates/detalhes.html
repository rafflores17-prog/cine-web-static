<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>{{ filme.title }} | {{ nome_site }}</title>

<link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#e50914">

<style>
/* BLOQUEIO DE MENU PWA */
* {
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
    box-sizing: border-box;
}

body { margin:0; font-family: sans-serif; color:white; background:black; overflow-x:hidden; }
.bg { position:fixed; top:0; left:0; width:100%; height:100%; background-size:cover; background-position:center; filter:blur(30px) brightness(0.2); z-index:-1; }
.container { padding:20px; max-width:450px; margin:0 auto; text-align:center; }
.poster img { width:150px; border-radius:15px; box-shadow:0 10px 30px rgba(0,0,0,0.8); margin-bottom:15px; pointer-events: none; }

.player-wrapper { 
    width: 100%; border-radius: 12px; overflow: hidden; background: #000; 
    margin: 15px 0; border: 1px solid #333; min-height: 200px; 
    display: flex; align-items: center; justify-content: center; position: relative; 
    background-image: url('{{ bg }}{{ filme.backdrop_path }}');
    background-size: cover; background-position: center;
}

video { width: 100%; display: block; z-index: 2; position: relative; }
iframe { width: 100%; height: 200px; border: none; z-index: 3; display: none; }

.aviso-uc { 
    display: none; padding: 20px; color: #fff; font-size: 14px; 
    position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.7);
    z-index: 10; flex-direction: column; justify-content: center; text-align: center;
}

.btn-externo { display: block; width: 100%; background: #e50914; color: white; padding: 15px; border-radius: 50px; font-weight: bold; text-decoration: none; margin-top: 10px; font-size: 14px; }
.meta-info { font-size: 11px; color: #00ff88; margin: 10px 0; font-weight: bold; }
.overview { background:rgba(255,255,255,0.07); padding:15px; border-radius:12px; font-size:13px; text-align:justify; margin-top: 15px; -webkit-user-select: none; }
.back { display:inline-block; margin-bottom:15px; color:#ccc; text-decoration:none; font-size:12px; background: rgba(255,255,255,0.1); padding: 5px 15px; border-radius: 20px; }
</style>
</head>
<body oncontextmenu="return false;">
<div class="bg" style="background-image:url('{{ bg }}{{ filme.backdrop_path }}')"></div>

<div class="container">
  <a class="back" href="/">⬅ Voltar</a>
  <div class="poster"><img src="{{ img }}{{ filme.poster_path }}"></div>
  <h1>{{ filme.title }}</h1>

  {% if play_link %}
    <div class="player-wrapper">
        <div id="uc-msg" class="aviso-uc">
            <p>⚠️ <b>Play Interno Bloqueado</b></p>
            <p>Toque no botão vermelho abaixo para abrir o filme.</p>
        </div>
        
        <video id="player" controls playsinline poster="{{ bg }}{{ filme.backdrop_path }}">
            <source src="{{ play_link }}" type="video/mp4">
        </video>

        {% if trailer_key %}
        <iframe id="trailer-iframe" src="https://www.youtube.com/embed/{{ trailer_key }}?rel=0&showinfo=0&modestbranding=1" allowfullscreen></iframe>
        {% endif %}
    </div>

    <div class="meta-info">SINAL VIP LOCALIZADO ✅</div>
    
    <a href="{{ play_link }}" target="_blank" class="btn-externo">▶️ ASSISTIR NO PLAYER EXTERNO</a>
  {% else %}
    <p>🔍 Buscando filme nos servidores...</p>
  {% endif %}

  <div class="overview">{{ filme.overview }}</div>
</div>

<script>(function(s){s.dataset.zone='10920008',s.src='https://nap5k.com/tag.min.js'})([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script')))</script>

<script>(function(s){s.dataset.zone='10920000',s.src='https://al5sm.com/tag.min.js'})([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script')))</script>

<script>
  const video = document.getElementById('player');
  const aviso = document.getElementById('uc-msg');
  const trailer = document.getElementById('trailer-iframe');

  if(video) {
    function ativarFallback() {
        video.style.display = 'none';
        if(trailer) trailer.style.display = 'block';
        else aviso.style.display = 'flex';
    }
    video.addEventListener('error', ativarFallback, true);
    setTimeout(() => { if (video.networkState === 3) ativarFallback(); }, 8000);
  }
</script>
</body>
</html>
