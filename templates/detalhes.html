<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ filme.title }} - CineWeb</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background-color: #000; color: white; 
            background-image: linear-gradient(to right, rgba(0,0,0,1) 20%, rgba(0,0,0,0.5)), url('{{ bg_base }}{{ filme.backdrop_path }}');
            background-size: cover; background-position: center; background-attachment: fixed;
        }
        .navbar { background: rgba(0,0,0,0.8); }
        .player-container { margin-top: 30px; background: black; padding: 5px; border-radius: 10px; box-shadow: 0 0 20px rgba(219,0,0,0.4); }
        .sinopse-box { background: rgba(0,0,0,0.7); padding: 20px; border-radius: 10px; margin-top: 20px; }
        .btn-voltar { color: white; text-decoration: none; font-size: 1.2rem; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark p-3">
    <div class="container">
        <a class="btn-voltar" href="/">⬅️ Voltar ao Início</a>
    </div>
</nav>

<div class="container mt-4">
    <div class="row">
        <div class="col-md-4">
            <img src="{{ img_base }}{{ filme.poster_path }}" class="img-fluid rounded shadow" alt="Poster">
            <div class="sinopse-box mt-3">
                <h2 class="fw-bold">{{ filme.title }}</h2>
                <p class="text-warning">⭐ {{ filme.vote_average | round(1) }}/10 | 📅 {{ filme.release_date }}</p>
                <p>{{ filme.overview }}</p>
            </div>
        </div>
        
        <div class="col-md-8">
            <h4 class="fw-bold mb-3">▶️ Assistir Agora</h4>
            <div class="player-container ratio ratio-16x9">
                <iframe src="https://embed.warezcdn.net/filme/{{ filme.id }}" allowfullscreen></iframe>
            </div>
        </div>
    </div>
</div>

</body>
</html>
