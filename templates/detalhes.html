<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0">

<title>{{ filme.title }}</title>

<style>

body {

margin: 0;
background: #000;
color: #fff;
font-family: Arial;

}

.container {

max-width: 500px;
margin: auto;
padding: 15px;
text-align: center;

}

.player-box {

width: 100%;
aspect-ratio: 16/9;

background: #000;

border-radius: 12px;

overflow: hidden;

border: 1px solid #333;

margin: 15px 0;

}

iframe,
video {

width: 100%;
height: 100%;
border: none;

}

.btn-play {

display: block;

width: 100%;

padding: 16px;

background: #e50914;

color: #fff;

border-radius: 40px;

font-weight: bold;

text-decoration: none;

margin-top: 15px;

}

.sinopse {

background: rgba(0,0,0,0.6);

padding: 15px;

border-radius: 12px;

text-align: justify;

font-size: 14px;

}

</style>

</head>

<body>

<div class="container">

<h1>

{{ filme.title }}

</h1>

<div>

⭐ {{ "%.1f"|format(filme.vote_average) }}
|
{{ filme.release_date[:4] }}

</div>

<!-- TRAILER -->

{% if trailer_key %}

<div class="player-box">

<iframe

src="
https://www.youtube.com/embed/{{ trailer_key }}

?rel=0
&modestbranding=1
&playsinline=1"

allowfullscreen>

</iframe>

</div>

{% endif %}

<!-- PLAYER -->

<div class="player-box">

<div id="player-container">

Carregando...

</div>

</div>

<div class="sinopse">

{{ filme.overview }}

</div>

</div>

<script>

function isUCBrowser() {

return navigator.userAgent
.toLowerCase()
.includes("ucbrowser")

}

function loadPlayer() {

var link =
"/play?url=" +
encodeURIComponent(
"{{ play_link }}"
)

var container =
document.getElementById(
"player-container"
)

if (!link) {

container.innerHTML =

"Filme indisponível"

return

}

if (isUCBrowser()) {

container.innerHTML = `

<video
controls
playsinline
preload="metadata">

<source
src="${link}"
type="video/mp4">

</video>

`

} else {

container.innerHTML = `

<iframe
src="${link}"
allowfullscreen>

</iframe>

`

}

}

document.addEventListener(

"DOMContentLoaded",

loadPlayer

)

</script>

</body>
</html>
