<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>{{ filme.title }}</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:white;
}

/* HERO FUNDO */
.hero {
  background: linear-gradient(to right, rgba(0,0,0,0.9), rgba(0,0,0,0.4)),
              url('{{ bg }}{{ filme.backdrop_path }}');
  background-size: cover;
  background-position: center;
  padding: 30px;
}

/* LAYOUT PRINCIPAL */
.container {
  display:flex;
  gap:20px;
  padding:20px;
  flex-wrap:wrap;
}

/* POSTER */
.poster {
  width:250px;
  border-radius:10px;
}

/* INFO */
.info {
  flex:1;
}

/* TRAILER */
.trailer {
  margin-top:20px;
}

iframe {
  width:100%;
  height:250px;
  border-radius:10px;
}

/* MOBILE */
@media (max-width:768px) {
  .container {
    flex-direction:column;
    align-items:center;
  }

  .poster {
    width:80%;
  }
}
</style>
</head>

<body>

<div class="hero">
  <h1>{{ filme.title }}</h1>
  <p>⭐ {{ filme.vote_average }}</p>
</div>

<div class="container">

  <!-- POSTER -->
  <img class="poster" src="{{ img }}{{ filme.poster_path }}">

  <!-- INFO -->
  <div class="info">
    <h2>Sinopse</h2>
    <p>{{ filme.overview }}</p>

    {% if trailer %}
    <div class="trailer">
      <h3>🎬 Trailer</h3>
      <iframe src="https://www.youtube.com/embed/{{ trailer }}" allowfullscreen></iframe>
    </div>
    {% endif %}

  </div>

</div>

</body>
</html>
